<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>قاعدة تصميم احميدة العيناوي</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB2ApaKYijeKrrsoValyUnlALovx35VLWc",
  authDomain: "ahmedalynawy2005.firebaseapp.com",
  projectId: "ahmedalynawy2005",
  storageBucket: "ahmedalynawy2005.firebasestorage.app",
  messagingSenderId: "509080098937",
  appId: "1:509080098937:web:e370ff675c79d873601ca8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(()=>{});

// معرف ثابت للبيانات المشتركة بين كل الأجهزة
const CLOUD_DOC = 'ahmedalynawy2005_data';
const DB_KEYS=['profile','timetable','exams','plan','completed','gen','net','semesters','uniInfo','academicManual'];

window.showSyncStatus=function(msg){
  let el=document.getElementById('sync-status');
  if(!el){el=document.createElement('div');el.id='sync-status';
    el.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1c1f2e;border:1px solid #2f3347;border-radius:10px;padding:8px 16px;color:#eef0f8;font-size:12px;z-index:9998;transition:opacity .5s;font-family:Tajawal,sans-serif';
    document.body.appendChild(el);}
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';},3000);
};

window.saveAllToCloud=async function(){
  try{
    const all={};
    DB_KEYS.forEach(k=>{const v=localStorage.getItem('tdb_'+k);if(v)all[k]=JSON.parse(v);});
    await db.collection('tdb').doc(CLOUD_DOC).set({value:JSON.stringify(all),updated:Date.now()});
    showSyncStatus('✅ تمت المزامنة');
  }catch(e){
    console.log('save error:',e.code,e.message);
    showSyncStatus('📵 لا يوجد إنترنت — محفوظ محلياً');
  }
};

window.loadFromCloud=async function(){
  try{
    const snap=await db.collection('tdb').doc(CLOUD_DOC).get();
    if(snap.exists){
      const allData=JSON.parse(snap.data().value);
      Object.keys(allData).forEach(k=>{localStorage.setItem('tdb_'+k,JSON.stringify(allData[k]));});
      return true;
    }
  }catch(e){console.log('load error:',e.code,e.message);}
  return false;
};
</script>


<style>
:root{
  --bg:#111318;--surface:#1c1f2e;--surface2:#252839;--border:#2f3347;
  --accent:#6c63ff;--accent2:#ff6584;--green:#43e97b;--red:#f5576c;
  --yellow:#f9ca24;--blue:#4facfe;--text:#eef0f8;--text2:#7b82a0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal','Noto Sans Arabic','Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
#home{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 20px 40px;gap:12px;z-index:1;overflow-y:auto}
#app{display:none;height:100vh;flex-direction:column;overflow:hidden;background:var(--bg)}
.home-cards{width:100%;max-width:720px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
button.home-card{border:1px solid var(--border);font-family:inherit;width:100%}
.home-card{background:var(--surface);border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s;color:var(--text);text-align:center;user-select:none;-webkit-user-select:none}
.home-card:hover{border-color:var(--accent);transform:translateY(-3px);background:var(--surface2);box-shadow:0 8px 24px rgba(108,99,255,.18)}
.home-card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;pointer-events:none}
.home-card-info{pointer-events:none}.home-card-info h3{font-size:13px;font-weight:700;margin-bottom:3px}
.home-card-info p{font-size:11px;color:var(--text2)}
.home-card-arrow{display:none}
#home-header{width:100%;max-width:720px;margin-bottom:4px}
@media(max-width:600px){
  #home{padding:16px 12px;gap:8px}
  .home-cards{grid-template-columns:1fr 1fr;gap:8px;max-width:100%}
  .home-card{padding:12px 10px;gap:7px}
  .home-card-icon{width:40px;height:40px;font-size:22px}
  .home-card-info h3{font-size:12px}
  .home-card-info p{font-size:10px}
  #home-header{max-width:100%}
}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:50;width:100%}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:7px 14px;cursor:pointer;font-family:'Tajawal','Noto Sans Arabic',Tahoma,Arial,sans-serif;font-size:13px;transition:all .15s;flex-shrink:0}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-title-bar{font-size:17px;font-weight:700;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-content{flex:1;padding:20px 24px;max-width:1100px;margin:0 auto;width:100%;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(max-width:600px){.topbar{padding:0 12px;height:50px}.page-content{padding:14px 12px}}
.sem-nav-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow:hidden;scrollbar-width:none}
.sem-nav-row::-webkit-scrollbar{display:none}

/* ── PROFILE ── */
.profile-hero{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;padding:24px;margin-bottom:16px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff;cursor:pointer;border:3px solid rgba(255,255,255,.4);flex-shrink:0;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-hero-info h2{font-size:20px;font-weight:900;color:#fff}
.profile-hero-info p{font-size:13px;color:rgba(255,255,255,.75);margin-top:3px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px}
.info-label{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.info-value{font-size:14px;font-weight:600}
.section-hdr{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.btn{border:none;border-radius:8px;padding:9px 16px;font-family:'Tajawal','Noto Sans Arabic',Tahoma,Arial,sans-serif;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;min-height:42px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn-sm{padding:7px 12px;font-size:12px;min-height:36px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:6px;min-height:36px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* ── SEMESTER SUB-HOME ── */
.sub-cards{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.sub-card:hover{border-color:var(--accent);background:var(--surface2)}
.sub-icon{font-size:24px}
.sub-info h4{font-size:14px;font-weight:700}
.sub-info p{font-size:12px;color:var(--text2);margin-top:2px}

/* ── TIMETABLE ── */
.timetable{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;table-layout:fixed}
.timetable th{background:var(--surface);border:1px solid var(--border);padding:6px 4px;text-align:center;font-weight:700;color:var(--text2);font-size:10px;white-space:normal;line-height:1.3}
.timetable td{border:1px solid var(--border);padding:0;height:60px;vertical-align:top}
.time-col{background:var(--surface);text-align:center;font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;padding:6px 8px}
.slot{height:100%;padding:6px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:3px}
.slot:hover{background:rgba(108,99,255,.1)}
.slot.filled{background:rgba(108,99,255,.12)}
.slot-name{font-size:12px;font-weight:700;color:var(--accent);line-height:1.2}
.slot-room{font-size:10px;color:var(--text2)}
.slot-empty{font-size:18px;opacity:.2}

/* ── EXAMS TABLE ── */
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.exam-card-header{padding:12px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.exam-card-title{font-size:14px;font-weight:700}
.exam-rows{display:grid;grid-template-columns:1fr 1fr;gap:0}
.exam-row{padding:12px 16px;border-top:1px solid var(--border)}
.exam-row-label{font-size:11px;color:var(--text2);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.exam-detail{display:flex;gap:8px;flex-wrap:wrap}
.exam-chip{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px}
/* Exam Table View */
.exam-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;margin-bottom:16px}
.exam-tbl thead tr th{background:var(--surface2);padding:10px 14px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--accent)}
.exam-tbl thead tr th:first-child{border-radius:10px 0 0 0}
.exam-tbl thead tr th:last-child{border-radius:0 10px 0 0}
.exam-tbl tbody tr{transition:background .15s}
.exam-tbl tbody tr:hover{background:var(--surface2)}
.exam-tbl tbody tr td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.exam-tbl tbody tr:last-child td{border-bottom:none}
.exam-tbl .badge-mid{background:rgba(79,172,254,.15);color:var(--blue);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.exam-tbl .badge-fin{background:rgba(108,99,255,.15);color:var(--accent);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
@media(max-width:600px){.exam-tbl{font-size:12px}.exam-tbl tbody tr td,.exam-tbl thead tr th{padding:8px 10px}}

/* ── ACADEMIC RECORD ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-box-val{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px}
.stat-box-label{font-size:11px;color:var(--text2)}
.progress-item{margin-bottom:12px}
.progress-item-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.progress-bar{background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* ── COURSES ── */
.course-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.course-grade{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0}
.course-info{flex:1}.course-name{font-size:14px;font-weight:700}
.course-meta{font-size:11px;color:var(--text2);margin-top:3px}
.course-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}

/* ── SEMESTER CARDS ── */

.sem-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:6px 14px;font-family:'Tajawal','Noto Sans Arabic',Tahoma,Arial,sans-serif;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s}
.sem-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sem-stat-row{display:flex;gap:12px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.sem-stat{text-align:center;flex:1;min-width:70px}
.sem-stat-val{font-size:20px;font-weight:900}
.sem-stat-lbl{font-size:10px;color:var(--text2);margin-top:2px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.mcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mcard-name{font-size:14px;font-weight:700}
.mcard-meta{font-size:11px;color:var(--text2);margin-top:2px}
.mcard-scores{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mscore{background:var(--bg);border-radius:8px;padding:8px;text-align:center}
.mscore-lbl{font-size:10px;color:var(--text2);margin-bottom:2px}
.mscore-val{font-size:18px;font-weight:900}
.pbar-sm{background:var(--border);border-radius:3px;height:4px;margin-top:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:580px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:24px;transform:translateY(20px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px}
.fg{margin-bottom:12px}.fl{font-size:11px;color:var(--text2);font-weight:700;margin-bottom:4px;display:block;text-transform:uppercase}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Tajawal','Noto Sans Arabic',Tahoma,Arial,sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus{border-color:var(--accent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

/* ── MISC ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(67,233,123,.15);color:var(--green)}.bb{background:rgba(79,172,254,.15);color:var(--blue)}
.bp{background:rgba(108,99,255,.15);color:var(--accent)}.by{background:rgba(249,202,36,.15);color:var(--yellow)}
.br{background:rgba(245,87,108,.15);color:var(--red)}
.toolbar-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-inp{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Tajawal','Noto Sans Arabic',Tahoma,Arial,sans-serif;font-size:13px;outline:none;width:180px}
.search-inp:focus{border-color:var(--accent)}
input[type=file]{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:500px){.fr{grid-template-columns:1fr}.timetable td{min-width:60px}.exam-rows{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ══════════════════ HOME ══════════════════ -->
<div id="home">
<div id="home-header" style="width:100%;max-width:720px;margin-bottom:4px">

      <button onclick="editUniInfo()" style="position:absolute;top:9px;left:9px;background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;z-index:3">✏️</button>
      <div style="display:flex;align-items:center;gap:14px">

          <div id="hdr-name" style="font-size:14px;font-weight:900;color:var(--accent);margin-top:6px;border-top:1px solid var(--border);padding-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">احمد ابو صلاح محمد العيناوي</div>
        </div>
        <div id="col-photo-wrap" style="flex-shrink:0"><div style="width:56px;height:56px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px">🎓</div></div>
      </div>
    </div>
  </div>
  <div class="home-cards" id="home-cards-wrap">
    <button type="button" class="home-card" onclick="openPage('profile')">

      <div class="home-card-info"><h3>الملف الشخصي</h3><p>البيانات الشخصية والمعلومات</p></div>
    </button>
    <button type="button" class="home-card" onclick="openPage('current-sem')">
      <div class="home-card-icon" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">📅</div>
      <div class="home-card-info"><h3>الفصل الحالي</h3><p>الخطة والجدول والامتحانات</p></div>
    </button>
    <button type="button" class="home-card" onclick="openPage('depts')">
      <div class="home-card-icon" style="background:linear-gradient(135deg,#43e97b,#38f9d7)">📚</div>
      <div class="home-card-info"><h3>الأقسام الدراسية</h3><p>قسم العام وقسم الشبكات</p></div>
    </button>
    <button type="button" class="home-card" onclick="openPage('completed')">
      <div class="home-card-icon" style="background:linear-gradient(135deg,#f9ca24,#f0932b)">✅</div>
      <div class="home-card-info"><h3>المقررات المكتملة</h3><p>المواد التي تم اجتيازها</p></div>

// ══ LOAD / SAVE ══
function ld(k){
  try{
    const v=localStorage.getItem('tdb_'+k);
    if(v)return JSON.parse(v);
  }catch(e){}
  try{
    const v=sessionStorage.getItem('tdb_'+k);
    if(v)return JSON.parse(v);
  }catch(e){}
  return DEF[k]?JSON.parse(JSON.stringify(DEF[k])):null;
}
function sv(k,d){
  try{localStorage.setItem('tdb_'+k,JSON.stringify(d));}catch(e){}
  try{sessionStorage.setItem('tdb_'+k,JSON.stringify(d));}catch(e){}
  if(typeof window.saveAllToCloud==='function'){
    clearTimeout(window._syncTimer);
    window._syncTimer=setTimeout(()=>window.saveAllToCloud(),2000);
  }
}

function saveMediaBlob(id,file){
  return new Promise((res,rej)=>{
    try{
      const req=indexedDB.open('tdb_blobs',1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore('blobs',{keyPath:'id'});
      req.onsuccess=e=>{
        try{
          const db=e.target.result;
          const tx=db.transaction('blobs','readwrite');
          tx.objectStore('blobs').put({id,blob:file,name:file.name,mimeType:file.type});
          tx.oncomplete=()=>{db.close();res();};
          tx.onerror=()=>{db.close();rej();};
        }catch(e){rej(e);}
      };
      req.onerror=()=>rej();
    }catch(e){rej(e);}
  });
}

function loadMediaBlob(id){
  return new Promise((res)=>{
    try{
      const req=indexedDB.open('tdb_blobs',1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore('blobs',{keyPath:'id'});
      req.onsuccess=e=>{
        try{
          const db=e.target.result;
          const r=db.transaction('blobs','readonly').objectStore('blobs').get(id);
          r.onsuccess=ev=>{
            db.close();
            if(ev.target.result){
              const blob=ev.target.result.blob;
              const url=URL.createObjectURL(blob);
              res(url);
            }else res(null);
          };
          r.onerror=()=>{db.close();res(null);};
        }catch(e){res(null);}
      };
      req.onerror=()=>res(null);
    }catch(e){res(null);}
  });
}

function delMediaBlob(id){
  if(!id)return;
  try{
    const req=indexedDB.open('tdb_blobs',1);
    req.onsuccess=e=>{
      const db=e.target.result;
      try{db.transaction('blobs','readwrite').objectStore('blobs').delete(id);}catch(e){}
      db.close();
    };
  }catch(e){}
}
let _idb=null;
function getIDB(){
  return new Promise((res,rej)=>{
    try{
      if(_idb)return res(_idb);
      if(!window.indexedDB)return rej('no idb');
      const req=indexedDB.open('tdb_media',1);
      req.onupgradeneeded=e=>e.target.result.createObjectStore('files',{keyPath:'id'});
      req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
      req.onerror=()=>rej('idb error');
      req.onblocked=()=>rej('idb blocked');
    }catch(e){rej(e);}
  });
}
function saveMedia(id,data){
  return getIDB().then(db=>{
    return new Promise((res,rej)=>{
      try{
        const tx=db.transaction('files','readwrite');
        tx.objectStore('files').put({id,data});
        tx.oncomplete=()=>res();
        tx.onerror=()=>rej();
      }catch(e){rej(e);}
    });
  });
}
function loadMedia(id){
  return getIDB().then(db=>{
    return new Promise((res)=>{
      try{
        const req=db.transaction('files','readonly').objectStore('files').get(id);
        req.onsuccess=e=>res(e.target.result?e.target.result.data:null);
        req.onerror=()=>res(null);
      }catch(e){res(null);}
    });
  }).catch(()=>null);
}
function delMedia(id){
  if(!id)return;
  getIDB().then(db=>{
    try{
      const tx=db.transaction('files','readwrite');
      tx.objectStore('files').delete(id);
    }catch(e){}
  }).catch(()=>{});
}

function renderExams(c){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary btn-sm" onclick="addExam()">＋ إضافة</button>`;
  const render=()=>{
    // ترتيب: مكتمل/قديم → نصفي قريب → نهائي قريب → بعيد → بدون تاريخ
    const today=new Date(); today.setHours(0,0,0,0);
    const parseDate=(str)=>{
      if(!str)return null;
      const p=str.split('/');
      if(p.length===3){const d=new Date(p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0'));if(!isNaN(d))return d;}
      return null;
    };
    const getSortKey=(e)=>{
      const mid=parseDate(e.mid&&e.mid.date);
      const fin=parseDate(e.fin&&e.fin.date);
      const midPast=mid&&mid<today;
      const finPast=fin&&fin<today;
      // كلاهما قديم أو مكتمل
      if((midPast||!mid)&&(finPast||!fin)){
        const last=Math.max(mid?mid.getTime():0,fin?fin.getTime():0);
        return{group:0,time:last||0};
      }
      // أقرب تاريخ قادم
      const upcoming=[];
      if(mid&&!midPast)upcoming.push(mid.getTime());
      if(fin&&!finPast)upcoming.push(fin.getTime());
      if(upcoming.length)return{group:1,time:Math.min(...upcoming)};
      return{group:2,time:0};
    };
    const sorted=[...DB.exams].map((e,i)=>({...e,_i:i,_sk:getSortKey(e)}))
      .sort((a,b)=>a._sk.group-b._sk.group||a._sk.time-b._sk.time);
    const rows=sorted.map((e,idx)=>{
      const isPast=e._sk.group===0;
      const midDate=parseDate(e.mid&&e.mid.date);
      const finDate=parseDate(e.fin&&e.fin.date);
      const midPast=midDate&&midDate<today;
      const finPast=finDate&&finDate<today;
      return`
      <tr style="background:${isPast?'rgba(100,100,100,.08)':'var(--surface2)'}">
        <td colspan="5" style="padding:6px 10px;border-bottom:1px solid var(--border)">

              <button style="background:rgba(245,87,108,.12);border:1px solid var(--border);border-radius:6px;color:var(--red);width:30px;height:28px;font-size:12px;cursor:pointer" onclick="delExam(${e._i})">🗑</button>
            </div>
          </div>
        </td>
      </tr>
      <tr style="border-bottom:1px solid rgba(255,255,255,.04);opacity:${midPast?'.5':'1'}">
        <td style="padding:5px 10px"><span style="background:rgba(79,172,254,.15);color:var(--blue);padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap">🕐 نصفي</span></td>
        <td style="padding:5px 6px;font-size:11px;color:var(--text)">${e.mid.date||'—'}</td>
        <td style="padding:5px 6px;font-size:11px;color:var(--text)">${e.mid.day||'—'}</td>
        <td style="padding:5px 6px;font-size:11px;color:var(--text)">${e.mid.time||'—'}</td>
        <td style="padding:5px 6px"><span style="background:rgba(79,172,254,.12);color:var(--blue);padding:1px 6px;border-radius:4px;font-size:11px;font-weight:700">${e.mid.room||'—'}</span></td>
      </tr>
      <tr style="border-bottom:2px solid var(--border);opacity:${finPast?'.5':'1'}">
        <td style="padding:5px 10px"><span style="background:rgba(108,99,255,.15);color:var(--accent);padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap">🎓 نهائي</span></td>
        <td style="padding:5px 6px;font-size:11px;color:var(--text)">${e.fin.date||'—'}</td>
        <td style="padding:5px 6px;font-size:11px;color:var(--text)">${e.fin.day||'—'}</td>
        <td style="padding:5px 6px;font-size:11px;color:var(--text)">${e.fin.time||'—'}</td>
        <td style="padding:5px 6px"><span style="background:rgba(108,99,255,.12);color:var(--accent);padding:1px 6px;border-radius:4px;font-size:11px;font-weight:700">${e.fin.room||'—'}</span></td>
      </tr>`;
    }).join('');
    document.getElementById('exams-list').innerHTML=rows
      ?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:var(--surface2);border-bottom:2px solid var(--accent)">
              <th style="padding:8px 10px;text-align:right;color:var(--text2);font-size:10px;font-weight:700">النوع</th>
              <th style="padding:8px 6px;text-align:right;color:var(--text2);font-size:10px;font-weight:700">التاريخ</th>
              <th style="padding:8px 6px;text-align:right;color:var(--text2);font-size:10px;font-weight:700">اليوم</th>
              <th style="padding:8px 6px;text-align:right;color:var(--text2);font-size:10px;font-weight:700">الوقت</th>
              <th style="padding:8px 6px;text-align:right;color:var(--text2);font-size:10px;font-weight:700">القاعة</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`
      :'<div style="text-align:center;padding:50px;color:var(--text2)">📝 لا توجد امتحانات</div>';
  };
  c.innerHTML=`<div id="exams-list"></div>`;render();window._examsRender=render;
}

  const parseD=s=>{
    if(!s)return null;
    if(s.includes('-')){const p=s.split('-');return new Date(p[0],p[1]-1,p[2]);}
    const p=s.split('/');return p.length===3?new Date(p[2],p[1]-1,p[0]):null;
  };
  const start=parseD(startStr), end=parseD(endStr);
  if(!start||!end)return'مخطط';
  const now=new Date();now.setHours(0,0,0,0);
  if(end<now)return'مكتمل';
  if(start<=now&&end>=now)return'نشط';
  const diff=(start-now)/(1000*60*60*24);
  if(diff<=31)return'قريباً';
  return'مخطط';
}

function sortPlanByDate(plans){
  const parseD=s=>{
    if(!s)return new Date(9999,0,1);
    if(s.includes('-')){const p=s.split('-');return new Date(p[0],p[1]-1,p[2]);}
    const p=s.split('/');return p.length===3?new Date(p[2],p[1]-1,p[0]):new Date(9999,0,1);
  };
  return [...plans].sort((a,b)=>parseD(a.start)-parseD(b.start));
}

function autoStatusFromDates(){
  const startStr=(document.getElementById('pl-start')||{}).value;
  const endStr=(document.getElementById('pl-end')||{}).value;
  const statusEl=document.getElementById('pl-status');
  if(!startStr||!endStr||!statusEl)return;
  // Parse DD/MM/YYYY
  const parseDate=s=>{const p=s.split('/');return p.length===3?new Date(p[2],p[1]-1,p[0]):null;};
  const start=parseDate(startStr), end=parseDate(endStr);
  if(!start||!end)return;
  const now=new Date(); now.setHours(0,0,0,0);
  const thisMonth=now.getMonth(), thisYear=now.getFullYear();
  const startM=start.getMonth(), startY=start.getFullYear();
  const endM=end.getMonth(), endY=end.getFullYear();
  if(end<now) statusEl.value='انتظار';
  else if(start<=now&&end>=now) statusEl.value='نشط';
  else if(startY===thisYear&&startM===thisMonth) statusEl.value='نشط';
  else if((startY*12+startM)-(thisYear*12+thisMonth)<=1) statusEl.value='قريباً';
  else statusEl.value='مخطط';
}

function calcSemStats(){
  var rows=(DB.semesters[curSem]&&DB.semesters[curSem].rows)||[];
  var valid=rows.filter(function(r){return r.name&&r.name.trim();});
  var allU=0;
  rows.forEach(function(r){allU+=parseFloat(r.units)||0;});
  var ws=0,wu=0;
  valid.forEach(function(r){
    var u=parseFloat(r.units)||0,g=parseFloat(r.total)||0;
    ws+=g*u; wu+=u;
  });
  var avg=wu>0?(ws/wu).toFixed(2):'0.00';
  var sumG=valid.reduce(function(s,r){return s+(parseFloat(r.total)||0);},0);
  // معدل العام: ناجحين فقط، آخر درجة لكل مادة
  var courseMap={};
  for(var gi=1;gi<=curSem;gi++){
    var gr=(DB.semesters[gi]&&DB.semesters[gi].rows)||[];
    gr.filter(function(r){return r.name&&r.name.trim();}).forEach(function(r){
      var g=parseFloat(r.total)||0,u=parseFloat(r.units)||0;
      if(g>=50) courseMap[r.name]={g:g,u:u};
    });
  }
  var gws=0,gwu=0;
  Object.keys(courseMap).forEach(function(k){gws+=courseMap[k].g*courseMap[k].u;gwu+=courseMap[k].u;});
  var gen=gwu>0?(gws/gwu).toFixed(2):'0.00';
  if(curSem===1) gen=avg;
  // حفظ معدل العام للسجل الدراسي
  window._lastGenAvg=gen;
  function ss(id){return document.getElementById(id);}
  if(ss('s-units'))ss('s-units').textContent=allU;
  if(ss('s-cum'))ss('s-cum').textContent=gwu;
  if(ss('s-sum'))ss('s-sum').textContent=Math.round(sumG);
  if(ss('s-avg'))ss('s-avg').textContent=avg;
  if(ss('s-gen'))ss('s-gen').textContent=gen;
}

function autoSyncCompleted(r){
  if(!r.name||!r.name.trim())return;
  var semNms={'1':'الأول','2':'الثاني','3':'الثالث','4':'الرابع','5':'الخامس','6':'السادس','7':'السابع','8':'الثامن','9':'التاسع','10':'العاشر'};
  var sn=semNms[String(curSem)]||String(curSem);
  var semLabel=(DB.semesters[curSem]&&DB.semesters[curSem].name)||('الفصل '+sn);
  var ei=DB.completed.findIndex(function(x){return x.name===r.name&&x.semNum===sn;});
  if((parseInt(r.total)||0)<50){
    if(ei>=0){DB.completed.splice(ei,1);sv('completed',DB.completed);}
    return;
  }
  var entry={id:ei>=0?DB.completed[ei].id:Date.now(),name:r.name,code:r.code||'',grade:parseInt(r.total)||0,units:parseInt(r.units)||3,sem:semLabel,semNum:sn,dept:r.dept||'عام'};
  if(ei>=0)DB.completed[ei]=entry;else DB.completed.push(entry);
  sv('completed',DB.completed);
}

function renderAcademicRecord(c){
  document.getElementById('topbar-actions').innerHTML='<button class="btn btn-primary btn-sm" onclick="editAcademic()">✏️ تعديل</button>';
  // حساب من الفصول
  var lastSem=0;
  for(var i=1;i<=10;i++){
    if((DB.semesters[i]&&DB.semesters[i].rows||[]).filter(function(r){return r.name&&r.name.trim();}).length>0) lastSem=i;
  }
  // معدل العام من آخر فصل مكتمل
  var courseMap={};
  for(var gi=1;gi<=lastSem;gi++){
    var gr=(DB.semesters[gi]&&DB.semesters[gi].rows)||[];
    gr.filter(function(r){return r.name&&r.name.trim();}).forEach(function(r){
      var g=parseFloat(r.total)||0,u=parseFloat(r.units)||0;
      if(g>=50) courseMap[r.name]={g:g,u:u};
    });
  }
  var gws=0,gwu=0;
  Object.keys(courseMap).forEach(function(k){gws+=courseMap[k].g*courseMap[k].u;gwu+=courseMap[k].u;});

function compressImage(file, maxW, quality, cb){
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const w=Math.min(img.width,maxW);
    const h=img.height*(w/img.width);
    const canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    cb(canvas.toDataURL('image/jpeg',quality));
  };
  img.src=url;
}

function previewUniPhoto(input,which){
  const f=input.files[0];if(!f)return;
  compressImage(f,400,0.7,data=>{
    const id=which==='uni'?'ui-uphoto':'ui-cphoto';
    const el=document.getElementById(id);
    if(el)el.value=data;
    const prevId=which==='uni'?'uni-photo-inp':'col-photo-inp';
    const label=document.getElementById(prevId);
    if(label){
      const prev=label.previousElementSibling;
      if(prev&&prev.tagName==='IMG')prev.src=data;
    }
  });
}

let recognition=null,isRecording=false,_voiceTarget=null;
function startVoice(targetId,btn){
  if(isRecording){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('⚠️ استخدم Chrome أو Edge للكتابة الصوتية');return;}
  recognition=new SR();recognition.continuous=true;recognition.interimResults=true;
  const el=document.getElementById(targetId);
  recognition.lang=/^[a-zA-Z]/.test((el&&el.placeholder)||'')?'en-US':'ar-SA';
  _voiceTarget=targetId;
  recognition.onstart=()=>{isRecording=true;if(btn)btn.style.background='var(--red)';if(btn)btn.style.color='#fff';};
  recognition.onresult=e=>{
    let final='';
    Array.from(e.results).forEach(r=>{if(r.isFinal)final+=r[0].transcript;});
    if(final&&el){el.value=(el.value?el.value+' ':'')+final;}
  };
  recognition.onerror=e=>{stopVoice();if(e.error!=='no-speech')alert('خطأ الميكروفون: '+e.error);};
  recognition.onend=()=>stopVoice();
  recognition.start();
}
function stopVoice(){
  isRecording=false;
  document.querySelectorAll('.mic-v-btn').forEach(b=>{b.style.background='';b.style.color='';});
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
}
function micBtn(id){return `<button class="mic-v-btn btn btn-ghost btn-sm" onclick="startVoice('${id}',this)" title="كتابة صوتية" style="padding:5px 8px">🎙️</button>`;}

let hwTarget=null,hwStrokes=[],hwCtx=null,hwDrawing=false;
function openHW(targetId){
  hwTarget=targetId;hwStrokes=[];
  document.getElementById('hw-modal').classList.add('open');
  setTimeout(initHWCanvas,100);
}
function initHWCanvas(){
  const canvas=document.getElementById('hw-canvas');
  if(!canvas)return;
  canvas.width=canvas.offsetWidth*2;canvas.height=220*2;
  canvas.style.height='220px';
  hwCtx=canvas.getContext('2d');hwCtx.scale(2,2);
  hwCtx.fillStyle='#ffffff';hwCtx.fillRect(0,0,canvas.width,canvas.height);
  hwCtx.strokeStyle='#1a1a2e';hwCtx.lineWidth=3;hwCtx.lineCap='round';hwCtx.lineJoin='round';
  // guide lines
  hwCtx.strokeStyle='#eee';hwCtx.lineWidth=1;
  for(let y=40;y<220;y+=40){hwCtx.beginPath();hwCtx.moveTo(0,y);hwCtx.lineTo(canvas.offsetWidth,y);hwCtx.stroke();}
  hwCtx.strokeStyle='#1a1a2e';hwCtx.lineWidth=3;
  const getP=(e,c)=>{const r=c.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left),y:(src.clientY-r.top)};};
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();hwDrawing=true;const p=getP(e,canvas);hwCtx.beginPath();hwCtx.moveTo(p.x,p.y);hwStrokes.push([p]);};
  canvas.onmousemove=canvas.ontouchmove=e=>{if(!hwDrawing)return;e.preventDefault();const p=getP(e,canvas);hwCtx.lineTo(p.x,p.y);hwCtx.stroke();hwStrokes[hwStrokes.length-1].push(p);};
  canvas.onmouseup=canvas.ontouchend=()=>{hwDrawing=false;};
}
function clearHW(){hwStrokes=[];initHWCanvas();}
function insertHW(){
  const txt=document.getElementById('hw-result').textContent;
  if(hwTarget&&txt&&txt!=='ستظهر النتيجة هنا...'){
    const el=document.getElementById(hwTarget);
    if(el)el.value=(el.value?el.value+' ':'')+txt;
  }
  document.getElementById('hw-modal').classList.remove('open');
}
async function recognizeHW(){
  document.getElementById('hw-status').textContent='⏳ جاري التعرف...';
  const canvas=document.getElementById('hw-canvas');
  try{
    if(typeof Tesseract==='undefined'){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const lang=document.getElementById('hw-lang').value;
    const r=await Tesseract.recognize(canvas,lang,{});
    document.getElementById('hw-result').textContent=r.data.text.trim()||'⚠️ لم يتم التعرف';
    document.getElementById('hw-status').textContent='✅ تم';
  }catch(e){document.getElementById('hw-status').textContent='❌ خطأ';}
}

function exportData(){
  const keys=['profile','timetable','exams','plan','completed','gen','net','semesters','uniInfo','academicManual','documents','albums'];
  const data={};
  keys.forEach(k=>{
    try{const v=localStorage.getItem('tdb_'+k);if(v)data[k]=JSON.parse(v);}catch(e){}
  });
  data._exported=new Date().toLocaleString('ar');

  // نضم ملفات الميديا من IndexedDB
  const docs=data.documents||[];
  const mediaIds=docs.filter(d=>d.idbId).map(d=>d.idbId);

  if(!mediaIds.length){
    _downloadJSON(data);
    return;
  }

  // نقرأ كل ملف من IDB ونحوله base64
  let loaded=0;
  data._media={};
  mediaIds.forEach(id=>{
    loadMediaBlob(id).then(url=>{
      if(url){
        // url هو objectURL — نقرأه كـ base64
        fetch(url).then(r=>r.blob()).then(blob=>{
          const rd=new FileReader();
          rd.onload=ev=>{
            data._media[id]=ev.target.result;
            loaded++;
            if(loaded===mediaIds.length)_downloadJSON(data);
          };
          rd.readAsDataURL(blob);
        }).catch(()=>{loaded++;if(loaded===mediaIds.length)_downloadJSON(data);});
      }else{loaded++;if(loaded===mediaIds.length)_downloadJSON(data);}
    }).catch(()=>{loaded++;if(loaded===mediaIds.length)_downloadJSON(data);});
  });
}

function _downloadJSON(data){
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='بياناتي_'+new Date().toLocaleDateString('ar').replace(/\//g,'-')+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('✅ تم تصدير البيانات بنجاح');
}

function importData(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const keys=['profile','timetable','exams','plan','completed','gen','net','semesters','uniInfo','academicManual','documents','albums'];
      keys.forEach(k=>{
        if(data[k]!==undefined){
          try{
            localStorage.setItem('tdb_'+k,JSON.stringify(data[k]));
            sessionStorage.setItem('tdb_'+k,JSON.stringify(data[k]));
          }catch(e){}
        }
      });

      // استعادة ملفات الميديا في IndexedDB
      const media=data._media||{};
      const mediaKeys=Object.keys(media);
      let restored=0;
      const finish=()=>{
        restored++;
        if(restored>=mediaKeys.length||!mediaKeys.length) _reloadDB();
      };
      if(!mediaKeys.length){_reloadDB();return;}
      mediaKeys.forEach(id=>{
        // base64 → blob → IDB
        fetch(media[id]).then(r=>r.blob()).then(blob=>{
          const file=new File([blob],id,{type:blob.type});
          saveMediaBlob(id,file).then(finish).catch(finish);
        }).catch(finish);
      });
    }catch(ex){alert('❌ خطأ في الاستيراد: '+ex.message);}
  };
  r.readAsText(f);
}

function uploadDocs(input){
  if(!DB.documents)DB.documents=[];
  const files=Array.from(input.files);
  if(!files.length)return;
  let done=0;
  const total=files.length;

  let progressBar=document.getElementById('upload-progress');
  if(!progressBar){
    progressBar=document.createElement('div');
    progressBar.id='upload-progress';
    progressBar.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;z-index:200;min-width:220px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5);font-size:13px;color:var(--text)';
    document.body.appendChild(progressBar);
  }
  progressBar.innerHTML=`⏳ جاري رفع 0 / ${total}...`;

  const finish=()=>{
    done++;
    progressBar.innerHTML=done===total
      ?`✅ تم رفع ${total} ملف بنجاح`
      :`⏳ جاري رفع ${done} / ${total}...`;
    if(done===total){
      sv('documents',DB.documents);
      window._docsRender&&window._docsRender();
      setTimeout(()=>{if(progressBar.parentNode)progressBar.remove();},2000);
    }
  };

  files.forEach(f=>{
    const type=f.type.startsWith('image')?'image'
      :(f.type.includes('pdf')||f.name.toLowerCase().endsWith('.pdf'))?'pdf'
      :(f.name.toLowerCase().match(/\.(xlsx?|xls)$/))?'excel'
      :(f.name.toLowerCase().match(/\.(docx?|doc)$/))?'word'
      :f.type.startsWith('video')?'video'
      :f.type.startsWith('audio')?'audio':'other';

    if(type==='image'){
      compressImage(f,800,0.75,data=>{
        DB.documents.push({name:f.name,type:'image',data,date:new Date().toLocaleDateString('ar')});
        finish();
      });

    } else if(type==='audio'){
      // حفظ في IndexedDB كـ blob مباشرة
      const id='audio_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      saveMediaBlob(id,f).then(()=>{
        DB.documents.push({name:f.name,type:'audio',idbId:id,date:new Date().toLocaleDateString('ar')});
        finish();
      }).catch(()=>{
        // fallback: base64 للملفات الصغيرة فقط
        if(f.size<5*1024*1024){
          const r=new FileReader();
          r.onload=e=>{DB.documents.push({name:f.name,type:'audio',data:e.target.result,date:new Date().toLocaleDateString('ar')});finish();};
          r.onerror=()=>finish();
          r.readAsDataURL(f);
        }else{
          alert('الملف كبير جداً — حاول مع ملف أصغر');finish();
        }
      });

    } else if(type==='video'){
      const id='video_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      const blobUrl=URL.createObjectURL(f);
      const v=document.createElement('video');
      v.muted=true;v.playsInline=true;v.preload='metadata';v.src=blobUrl;
      let saved=false;
      const saveVideo=(thumb)=>{
        if(saved)return;saved=true;
        URL.revokeObjectURL(blobUrl);v.src='';v.onloadedmetadata=null;v.onseeked=null;v.onerror=null;
        saveMediaBlob(id,f).then(()=>{
          DB.documents.push({name:f.name,type:'video',idbId:id,thumb,date:new Date().toLocaleDateString('ar')});
          finish();
        }).catch(()=>{
          DB.documents.push({name:f.name,type:'video',idbId:id,thumb,date:new Date().toLocaleDateString('ar')});
          finish();
        });
      };
      v.onloadedmetadata=()=>{v.currentTime=0.5;};
      v.onseeked=()=>{
        try{
          const cv=document.createElement('canvas');
          cv.width=Math.min(v.videoWidth||320,320);
          cv.height=Math.round(cv.width*(v.videoHeight||240)/(v.videoWidth||320));
          cv.getContext('2d').drawImage(v,0,0,cv.width,cv.height);
          saveVideo(cv.toDataURL('image/jpeg',0.5));
        }catch(e){saveVideo(null);}
      };
      v.onerror=()=>saveVideo(null);
      setTimeout(()=>{if(!saved)saveVideo(null);},5000);
      v.load();

    } else {
      const reader=new FileReader();
      reader.onload=e=>{
        DB.documents.push({name:f.name,type,data:e.target.result,date:new Date().toLocaleDateString('ar')});
        finish();
      };
      reader.onerror=()=>finish();
      reader.readAsDataURL(f);
    }
  });
}

function viewDoc(i){
  var d=DB.documents[i];if(!d)return;

  // الفيديو يستخدم blobUrl
  if(d.type==='video'){
    const show=(src)=>{
      if(!src){alert('أعد رفع الفيديو');return;}
      const ov5=_makeOv(d.name||'فيديو','#000');
      const vid2=document.createElement('video');
      vid2.src=src;vid2.controls=true;vid2.autoplay=true;vid2.playsInline=true;
      vid2.style.cssText='flex:1;width:100%;max-height:100%;background:#000';
      ov5.body.appendChild(vid2);
      document.body.appendChild(ov5.el);
    };
    if(d.idbId){loadMediaBlob(d.idbId).then(url=>show(url));}
    else show(d.data||null);
    return;
  }

  if(d.type==='audio'){
    const play=(src)=>{
      if(!src){alert('أعد رفع الملف الصوتي');return;}
      const ov6=document.createElement('div');
      ov6.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px';
      ov6.innerHTML=`<div style="color:#fff;font-size:40px">🎵</div>
        <div style="color:#fff;font-size:14px;font-weight:700;max-width:80vw;text-align:center">${d.name||'تشغيل'}</div>
        <audio controls autoplay src="${src}" style="max-width:90vw"></audio>
        <button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:8px">إغلاق</button>`;
      document.body.appendChild(ov6);
    };
    if(d.idbId){loadMediaBlob(d.idbId).then(url=>play(url));}
    else play(d.data||null);
    return;
  }

  var data=d.data||(d.objId&&window._docFiles?window._docFiles[d.objId]:null);
  if(!data){alert('أعد رفع الملف');return;}

  // ── صورة ──
  if(d.type==='image'){
    var ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center';
    ov.onclick=function(){document.body.removeChild(ov);};
    var img=document.createElement('img');
    img.src=data;img.style.cssText='max-width:100%;max-height:100%;object-fit:contain';
    img.onclick=function(e){e.stopPropagation();};
    var cb=document.createElement('button');
    cb.textContent='✕';cb.style.cssText='position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer';
    cb.onclick=function(e){e.stopPropagation();document.body.removeChild(ov);};
    ov.appendChild(img);ov.appendChild(cb);document.body.appendChild(ov);
    return;
  }

  // ── PDF: عرض باستخدام PDF.js (يعمل في كل المتصفحات) ──
  if(d.type==='pdf'){
    try{
      var bin=atob(data.split(',')[1]);
      var pdfBuf=new Uint8Array(bin.length);
      for(var j=0;j<bin.length;j++) pdfBuf[j]=bin.charCodeAt(j);
      var ovPdf=_makeOv(d.name||'PDF','#1a1a2e');
      ovPdf.body.style.overflow='auto';
      ovPdf.body.style.padding='12px';
      ovPdf.body.style.alignItems='center';
      var loadingDiv=document.createElement('div');
      loadingDiv.style.cssText='color:#fff;text-align:center;padding:30px;font-size:14px';
      loadingDiv.textContent='⏳ جاري تحميل PDF...';
      ovPdf.body.appendChild(loadingDiv);
      document.body.appendChild(ovPdf.el);
      var renderPDF=function(){
        var pdfjsLib=window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        var loadingTask=pdfjsLib.getDocument({data:pdfBuf});
        loadingTask.promise.then(function(pdf){
          ovPdf.body.innerHTML='';
          var pageCount=pdf.numPages;
          var counter=document.createElement('div');
          counter.style.cssText='color:rgba(255,255,255,.6);font-size:12px;text-align:center;padding:4px 0 8px;flex-shrink:0';
          counter.textContent='📄 '+pageCount+' صفحة';
          ovPdf.body.appendChild(counter);
          var canvasWrap=document.createElement('div');
          canvasWrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:8px;padding-bottom:20px';
          ovPdf.body.appendChild(canvasWrap);
          for(var pn=1;pn<=pageCount;pn++){
            (function(pageNum){
              pdf.getPage(pageNum).then(function(page){
                var vp=page.getViewport({scale:1.5});
                var canvas=document.createElement('canvas');
                canvas.width=vp.width; canvas.height=vp.height;
                canvas.style.cssText='max-width:100%;box-shadow:0 2px 12px rgba(0,0,0,.5);border-radius:4px;background:#fff';
                canvasWrap.appendChild(canvas);
                page.render({canvasContext:canvas.getContext('2d'),viewport:vp});
              });
            })(pn);
          }
        }).catch(function(err){
          ovPdf.body.innerHTML='<div style="color:#f5576c;text-align:center;padding:30px">❌ تعذر فتح PDF: '+err.message+'</div>';
        });
      };
      if(window['pdfjs-dist/build/pdf']){renderPDF();}
      else{
        var sp=document.createElement('script');
        sp.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        sp.onload=renderPDF;
        sp.onerror=function(){ovPdf.body.innerHTML='<div style="color:#f5576c;text-align:center;padding:30px">❌ تعذر تحميل PDF.js</div>';};
        document.head.appendChild(sp);
      }
    }catch(e){alert('تعذر فتح PDF: '+e.message);}
    return;
  }

  // ── Excel: عرض داخل التطبيق باستخدام SheetJS ──
  if(d.type==='excel'){
    try{
      var ov2=_makeOv(d.name||'Excel','#1d2030');
      ov2.body.style.overflow='auto';
      ov2.body.style.padding='12px';
      ov2.body.innerHTML='<div style="color:#fff;text-align:center;padding:30px;font-size:14px">⏳ جاري تحميل الجدول...</div>';
      document.body.appendChild(ov2.el);
      var loadXLSX=function(){
        var bin=atob(data.split(',')[1]);
        var buf=new Uint8Array(bin.length);
        for(var j=0;j<bin.length;j++) buf[j]=bin.charCodeAt(j);
        var wb=XLSX.read(buf,{type:'array'});
        var html='';
        wb.SheetNames.forEach(function(sn,si){
          var ws=wb.Sheets[sn];
          var sheetHtml=XLSX.utils.sheet_to_html(ws,{id:'xlsx-sheet-'+si,editable:false});
          html+='<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;padding:4px 10px;background:rgba(108,99,255,.15);border-radius:6px;display:inline-block">📊 '+sn+'</div>'+sheetHtml+'</div>';
        });
        ov2.body.innerHTML='<style>.xlsx-tbl table{border-collapse:collapse;min-width:100%;font-size:12px;color:#eee}.xlsx-tbl td,.xlsx-tbl th{border:1px solid #2f3347;padding:6px 10px;white-space:nowrap}.xlsx-tbl tr:nth-child(even){background:rgba(255,255,255,.04)}.xlsx-tbl tr:first-child td,.xlsx-tbl tr:first-child th{background:#252839;font-weight:700}</style><div class="xlsx-tbl">'+html+'</div>';
        // تطبيق الستايل على جميع الجداول الناتجة
        ov2.body.querySelectorAll('table').forEach(function(t){t.style.borderCollapse='collapse';});
      };
      if(typeof XLSX!=='undefined'){loadXLSX();}
      else{
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=loadXLSX;
        s.onerror=function(){ov2.body.innerHTML='<div style="color:#f5576c;text-align:center;padding:30px">❌ تعذر تحميل مكتبة Excel</div>';};
        document.head.appendChild(s);
      }
    }catch(e){alert('تعذر فتح Excel: '+e.message);}
    return;
  }

  // ── Word: عرض داخل التطبيق باستخدام mammoth ──
  if(d.type==='word'){
    try{
      var ov3=_makeOv(d.name||'Word','#1a2036');
      ov3.body.style.overflow='auto';
      ov3.body.innerHTML='<div style="color:#fff;text-align:center;padding:30px;font-size:14px">⏳ جاري تحميل المستند...</div>';
      document.body.appendChild(ov3.el);
      var loadMammoth=function(){
        var bin=atob(data.split(',')[1]);
        var buf=new Uint8Array(bin.length);
        for(var j=0;j<bin.length;j++) buf[j]=bin.charCodeAt(j);
        mammoth.convertToHtml({arrayBuffer:buf.buffer}).then(function(result){
          ov3.body.innerHTML='<div style="background:#fff;color:#111;padding:32px;max-width:820px;margin:0 auto;min-height:100%;font-family:Arial,Tahoma,sans-serif;font-size:14px;line-height:1.7;direction:rtl">'+result.value+'</div>';
        }).catch(function(err){
          ov3.body.innerHTML='<div style="color:#f5576c;text-align:center;padding:30px">❌ تعذر فتح المستند</div>';
        });
      };
      if(typeof mammoth!=='undefined'){loadMammoth();}
      else{
        var sm=document.createElement('script');
        sm.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
        sm.onload=loadMammoth;
        sm.onerror=function(){ov3.body.innerHTML='<div style="color:#f5576c;text-align:center;padding:30px">❌ تعذر تحميل مكتبة Word</div>';};
        document.head.appendChild(sm);
      }
    }catch(e){alert('تعذر فتح Word: '+e.message);}
    return;
  }

  // ── صوت وفيديو ──
  try{
    var mime2;
    if(d.type==='audio'){mime2='audio/mpeg';}
    else if(d.type==='video'){
      mime2=d.mimeType||'video/mp4';
    } else {mime2='application/octet-stream';}
    var ov5=_makeOv(d.name||'ملف','#000');
    if(d.type==='video'){
      var srcUrl=d.blobUrl||data;
      var vid2=document.createElement('video');
      vid2.src=srcUrl;vid2.controls=true;vid2.autoplay=true;
      vid2.style.cssText='flex:1;width:100%;max-height:100%;background:#000';
      vid2.onerror=function(){
        // بعد إغلاق الصفحة قد يبطل blob URL - نحاول base64 إذا كان موجوداً
        if(d.data){vid2.src=d.data;}
        else{ov5.body.innerHTML='<div style="color:#f5576c;text-align:center;padding:30px;margin:auto">❌ تعذر تشغيل الفيديو<br><small style="color:#7b82a0">جرب إعادة رفع الملف</small></div>';}
      };
      ov5.body.appendChild(vid2);
    } else {
      var srcUrlA=data;
      var aud2=document.createElement('audio');aud2.src=srcUrlA;aud2.controls=true;
      aud2.style.cssText='width:90%;margin:auto';ov5.body.style.alignItems='center';ov5.body.appendChild(aud2);
    }
    document.body.appendChild(ov5.el);
  }catch(e){alert('تعذر فتح الملف: '+e.message);}
}

function _b64Blob(b64,mime){
  var bin=atob(b64.split(',')[1]);
  var buf=new Uint8Array(bin.length);
  for(var j=0;j<bin.length;j++) buf[j]=bin.charCodeAt(j);
  return new Blob([buf],{type:mime});
}

function _makeOv(title,bg,onClose){
  var el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;background:'+(bg||'#000');
  var bar=document.createElement('div');
  bar.style.cssText='background:rgba(0,0,0,.5);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:46px';
  var ttl=document.createElement('span');
  ttl.style.cssText='color:#fff;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%';
  ttl.textContent=title||'';
  var cb=_closeBtn(function(){document.body.removeChild(el);if(onClose)onClose();});
  bar.appendChild(ttl); bar.appendChild(cb); el.appendChild(bar);
  var body=document.createElement('div');
  body.style.cssText='flex:1;display:flex;flex-direction:column;overflow:hidden';
  el.appendChild(body);
  return {el:el,body:body};
}

function _closeBtn(fn){
  var b=document.createElement('button');
  b.innerHTML='✕ إغلاق';
  b.style.cssText='background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:Tajawal,sans-serif;white-space:nowrap';
  b.onclick=fn; return b;
}

function downloadDoc(i){
  const d=DB.documents[i];if(!d||!d.data)return;
  const a=document.createElement('a');
  a.href=d.data;a.download=d.name||'file';
  document.body.appendChild(a);a.click();
  setTimeout(()=>document.body.removeChild(a),500);
}

function filterDocs(val){document.querySelectorAll('#docs-grid>div').forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(val.toLowerCase())?'':'none';});}

function checkPasswordGate(cb){

  showSplashGate(stored, cb);

function showSplashGate(stored, cb){
  const gate=document.createElement('div');
  gate.style.cssText='position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0a1628 0%,#0d2040 40%,#0a1a35 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:Tajawal,sans-serif;transition:opacity .4s';
  const stars=Array.from({length:30},()=>`<div style="position:absolute;width:${(Math.random()*3+1).toFixed(1)}px;height:${(Math.random()*3+1).toFixed(1)}px;background:#c9a84c;border-radius:50%;opacity:${(Math.random()*.4+.1).toFixed(2)};top:${(Math.random()*100).toFixed(1)}%;left:${(Math.random()*100).toFixed(1)}%"></div>`).join('');

  gate.innerHTML=`
    <style>
      @keyframes gfadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
      @keyframes gshimmer{0%,100%{opacity:.6}50%{opacity:1}}
      .g-card{animation:gfadeUp .5s ease forwards}
      .g-orn{color:#c9a84c;opacity:.7;letter-spacing:4px;animation:gshimmer 3s ease infinite}
    </style>
    <div style="position:fixed;inset:0;overflow:hidden;pointer-events:none">${stars}</div>
    <div class="g-card" style="width:100%;max-width:360px;position:relative;z-index:1">
      <div style="background:linear-gradient(145deg,#0f2d4a,#0a1f35);border:2px solid #c9a84c;border-radius:24px;padding:32px 24px 28px;box-shadow:0 0 40px rgba(201,168,76,.15),inset 0 1px 0 rgba(201,168,76,.2);position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(201,168,76,.03) 28px,rgba(201,168,76,.03) 29px);border-radius:24px;pointer-events:none"></div>
        <div style="text-align:center;margin-bottom:6px">
          <div style="width:54px;height:54px;border:2px solid #c9a84c;border-radius:50%;background:linear-gradient(135deg,#0f2d4a,#1a3d5c);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;box-shadow:0 0 15px rgba(201,168,76,.3)">
            <span style="font-size:24px">🎓</span>
          </div>
        </div>
        <div class="g-orn" style="text-align:center;font-size:16px;margin-bottom:10px">❧ ✦ ❧</div>
        <div style="text-align:center;margin-bottom:6px">
          <div style="font-size:26px;font-weight:900;background:linear-gradient(135deg,#c9a84c,#f0d080,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3">قاعدة بيانات الكلية</div>
        </div>
        <div style="text-align:center;color:#8ab4cc;font-size:13px;margin-bottom:14px">${stored?'أدخل كلمة المرور للمتابعة':'مرحباً بك'}</div>
        <div class="g-orn" style="text-align:center;font-size:13px;margin-bottom:18px">─── ✦ ───</div>
        ${stored?`
        <div style="position:relative;margin-bottom:8px">
          <input id="gate-inp" type="password" placeholder="كلمة المرور..." autocomplete="current-password"
            style="width:100%;box-sizing:border-box;background:rgba(10,30,55,.8);border:1.5px solid #c9a84c;border-radius:12px;padding:13px 44px 13px 16px;color:#eef0f8;font-family:Tajawal,sans-serif;font-size:15px;outline:none;text-align:right;direction:rtl;transition:border-color .2s,box-shadow .2s">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.7">🔑</span>
        </div>
        <div id="gate-err" style="color:#f5576c;font-size:12px;min-height:16px;text-align:center;margin-bottom:8px"></div>`:''}
        <button id="gate-btn"
          style="width:100%;background:linear-gradient(135deg,#1a3a8f,#2952c4,#1a3a8f);border:2px solid #c9a84c;border-radius:12px;padding:14px;color:#fff;font-family:Tajawal,sans-serif;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(41,82,196,.4);transition:transform .1s,box-shadow .1s">
          ${stored?'دخول':'فتح القاعدة'}
        </button>
        <div class="g-orn" style="text-align:center;margin-top:18px;font-size:13px">─── ✦ ───</div>
      </div>
      <div style="text-align:center;margin-top:16px;color:#c9a84c;font-size:13px;letter-spacing:2px;font-weight:700">👤 ahmedalynawy2005</div>
    </div>`;

  document.body.appendChild(gate);
  const btn=gate.querySelector('#gate-btn');
  const inp=gate.querySelector('#gate-inp');
  const err=gate.querySelector('#gate-err');
  if(inp)inp.focus();

  function closeGate(){
    gate.style.opacity='0';
    setTimeout(()=>{document.body.removeChild(gate);cb();},400);
  }

  function tryLogin(){
    if(!stored){closeGate();return;}
    const val=inp?inp.value:'';
    if(btoa(val)===stored){
      closeGate();
    }else{
      if(err)err.textContent='❌ كلمة المرور غير صحيحة';
      if(inp){inp.style.borderColor='#f5576c';inp.value='';}
      setTimeout(()=>{if(inp)inp.style.borderColor='#c9a84c';if(err)err.textContent='';},2000);
    }
  }
  btn.onclick=tryLogin;
  btn.onmousedown=()=>{btn.style.transform='scale(.97)';btn.style.boxShadow='none'};
  btn.onmouseup=()=>{btn.style.transform='';btn.style.boxShadow='0 4px 20px rgba(41,82,196,.4)'};

    inp.addEventListener('blur',()=>{inp.style.borderColor='#c9a84c';inp.style.boxShadow='none'});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  }
}
